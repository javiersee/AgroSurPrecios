<div class="histograma-container">
  <div class="header-grafico">
    <h2 class="titulo">📊 Histograma de precios</h2>

    <div class="select-wrapper">
      <span class="select-label">Ver</span>
      <select [value]="periodo" (change)="onPeriodoChange($event)" class="select-periodo">
        <option value="hoy">Hoy</option>
        <option value="semana">Semana</option>
        <option value="mes">Mes</option>
        <option value="anio">Año</option>
        <option value="todos">Todos los registros</option>
      </select>
    </div>
  </div>

  <div class="card-promedio">
    <span class="label-promedio">
      PROMEDIO
      <ng-container [ngSwitch]="periodo">
        <span *ngSwitchCase="'hoy'">DE HOY</span>
        <span *ngSwitchCase="'semana'">SEMANAL</span>
        <span *ngSwitchCase="'mes'">MENSUAL</span>
        <span *ngSwitchCase="'anio'">ANUAL</span>
        <span *ngSwitchDefault>HISTÓRICO</span>
      </ng-container>
    </span>

    <strong class="valor-promedio">
      {{ ((periodo === 'todos' ? (promedioTotal$ | async) : promedioVisual) || 0) | currency:'COP':'symbol':'1.0-0' }}
    </strong>
  </div>

  <div class="chart-container">
    <canvas id="histogramaPrecios"></canvas>
  </div>
</div>
